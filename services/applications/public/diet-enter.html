<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - HealthAssist Entry</title>
    <link rel="stylesheet" href="/css/style.css?v=3">
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div class="container">
        <h1 class="page-title">HealthAssist Entry</h1>

        <!-- Receipt & Barcode Scan -->
        <div class="card" style="margin-bottom:12px;padding:10px 14px">
            <div style="display:flex;align-items:center;gap:10px">
                <input type="file" id="receipt-file" accept="image/*,.pdf" style="display:none">
                <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('receipt-file').click()" style="white-space:nowrap">Scan Receipt</button>
                <button type="button" class="btn btn-outline btn-sm" onclick="openBarcodeScanner()" style="white-space:nowrap">Scan Barcode</button>
                <span id="receipt-status" style="font-size:12px;color:var(--text-muted)"></span>
            </div>
            <div id="receipt-review" style="display:none;margin-top:10px">
                <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px">Food items found on receipt:</div>
                <div id="receipt-items-list"></div>
                <div style="display:flex;gap:8px;margin-top:8px">
                    <button class="btn btn-success btn-sm" id="receipt-add-all">Add All to Log</button>
                    <button class="btn btn-outline btn-sm" id="receipt-dismiss">Dismiss</button>
                </div>
            </div>
        </div>

        <!-- Diet Entry Form -->
        <div class="diet-entry-panel">
            <div class="diet-entry-form">
                <div class="diet-entry-row">
                    <select id="diet-entry-type" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;min-width:100px">
                        <option value="food">Food</option>
                        <option value="liquid">Liquid</option>
                        <option value="vitamin">Vitamin</option>
                        <option value="supplement">Supplement</option>
                    </select>
                    <select id="diet-meal-type" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;min-width:100px">
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="snack">Snack</option>
                        <option value="other">Other</option>
                    </select>
                    <div style="flex:1;position:relative">
                        <input type="text" id="diet-description" placeholder="What did you eat/drink?" autocomplete="off"
                               style="width:100%;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;box-sizing:border-box"
                               onkeydown="handleDescKeydown(event)">
                        <div id="food-autocomplete" class="autocomplete-dropdown"></div>
                    </div>
                    <input type="number" id="diet-quantity" placeholder="Qty" step="0.1"
                           style="width:60px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
                    <select id="diet-unit" style="width:90px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
                        <option value="serving" selected>serving</option>
                        <option value="piece">piece</option>
                        <option value="cup">cup</option>
                        <option value="oz">oz</option>
                        <option value="g">g</option>
                        <option value="ml">ml</option>
                        <option value="slice">slice</option>
                        <option value="bottle">bottle</option>
                        <option value="can">can</option>
                        <option value="tbsp">tbsp</option>
                        <option value="tsp">tsp</option>
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="addDietEntry()">Add</button>
                </div>
            </div>
        </div>

        <!-- Quick Add Recent Foods -->
        <div id="recent-foods" class="card" style="margin-bottom:12px;padding:10px 14px;display:none">
            <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Quick Add</div>
            <div id="recent-foods-list" class="recent-foods-list"></div>
        </div>

        <!-- Saved Meals -->
        <div id="saved-meals-panel" class="card" style="margin-bottom:12px;padding:10px 14px;display:none">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <span style="font-size:13px;font-weight:600;color:var(--text-muted)">Saved Meals</span>
                <button class="btn btn-outline btn-sm" onclick="showSaveMealDialog()" style="font-size:11px">Save Current Meal</button>
            </div>
            <div id="saved-meals-list"></div>
            <div id="save-meal-dialog" style="display:none;margin-top:10px;padding:10px;background:var(--bg-secondary);border-radius:var(--radius)">
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                    <input type="text" id="save-meal-name" placeholder="Meal name (e.g. My Usual Breakfast)" style="flex:1;min-width:150px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
                    <select id="save-meal-type" style="padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="snack">Snack</option>
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="saveCurrentMeal()">Save</button>
                    <button class="btn btn-outline btn-sm" onclick="document.getElementById('save-meal-dialog').style.display='none'">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Nutrition Summary -->
        <div class="nutrition-summary">
            <div class="nutrition-header">
                <div class="nutrition-title">Today's Nutrition</div>
                <input type="date" id="diet-date" style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px"
                       onchange="loadDietData()">
            </div>
            <div class="nutrition-cards" id="nutrition-cards">
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-calories">0</div>
                    <div class="nutrition-card-label">Calories</div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-protein">0g</div>
                    <div class="nutrition-card-label">Protein</div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-carbs">0g</div>
                    <div class="nutrition-card-label">Carbs</div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-fat">0g</div>
                    <div class="nutrition-card-label">Fat</div>
                    <div id="nc-fat-detail" style="font-size:10px;color:var(--text-muted);margin-top:2px"></div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-fiber">0g</div>
                    <div class="nutrition-card-label">Fiber</div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-sugar">0g</div>
                    <div class="nutrition-card-label">Sugar</div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-sodium">0mg</div>
                    <div class="nutrition-card-label">Sodium</div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-caffeine">0mg</div>
                    <div class="nutrition-card-label">Caffeine</div>
                </div>
                <div class="nutrition-card">
                    <div class="nutrition-card-value" id="nc-entries">0</div>
                    <div class="nutrition-card-label">Entries</div>
                </div>
            </div>
        </div>

        <!-- Today's Entries -->
        <div class="diet-entries-list" id="diet-entries-list">
            <div style="color:var(--text-muted);font-size:13px;padding:12px 0">No entries yet today. Add food above!</div>
        </div>
    </div>
    </main>

    <!-- Barcode Modal -->
    <div id="barcode-modal" style="display:none"></div>

    <script src="/js/app.js?v=3"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="/js/diet-enter.js?v=3"></script>
</body>
</html>
