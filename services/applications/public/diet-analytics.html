<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - Diet Analytics</title>
    <link rel="stylesheet" href="/css/style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div class="container" style="max-width:1200px">
        <div class="analytics-header">
            <div>
                <h1 class="page-title" style="margin-bottom:4px">Diet Analytics</h1>
                <p class="analytics-subtitle">Nutrition tracking insights</p>
            </div>
        </div>

        <div class="analytics-cards" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
            <div class="analytics-card">
                <div class="analytics-card-label">Total Entries</div>
                <div class="analytics-card-value" id="stat-entries">-</div>
            </div>
            <div class="analytics-card">
                <div class="analytics-card-label">Avg Daily Calories</div>
                <div class="analytics-card-value" id="stat-avg-cal">-</div>
            </div>
            <div class="analytics-card">
                <div class="analytics-card-label">Days Tracked</div>
                <div class="analytics-card-value" id="stat-days">-</div>
            </div>
        </div>

        <div class="analytics-row">
            <div class="analytics-panel" style="flex:2">
                <div class="analytics-panel-title">Daily Calories (Last 14 Days)</div>
                <div class="chart-container chart-lg">
                    <canvas id="calories-chart"></canvas>
                </div>
            </div>
            <div class="analytics-panel" style="flex:1;max-width:320px">
                <div class="analytics-panel-title">Macronutrient Split</div>
                <div class="chart-container chart-md">
                    <canvas id="macros-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Per-Intent Performance -->
        <div class="analytics-panel" id="intent-panel" style="display:none;margin-top:16px">
            <h3 class="analytics-panel-title">Per-Intent Performance</h3>
            <div class="chart-container chart-md">
                <canvas id="chart-intent"></canvas>
            </div>
            <div id="intent-train-weakest" style="display:none;margin-top:10px;text-align:right">
                <button class="btn btn-sm btn-primary" onclick="trainOnWeakestIntents('diet')">Train on weakest intents</button>
            </div>
        </div>

        <!-- Training Performance -->
        <div id="diet-training-section" style="margin-top:24px">
            <h2 style="font-size:18px;font-weight:600;margin-bottom:12px">Training Performance</h2>
            <div class="analytics-cards" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
                <div class="analytics-card card-highlight">
                    <div class="analytics-card-label">Current Level</div>
                    <div class="analytics-card-value" id="diet-level">-</div>
                </div>
                <div class="analytics-card card-highlight">
                    <div class="analytics-card-label">Win Rate</div>
                    <div class="analytics-card-value" id="diet-winrate">-</div>
                </div>
                <div class="analytics-card">
                    <div class="analytics-card-label">Avg Oggy Accuracy</div>
                    <div class="analytics-card-value" id="diet-oggy-acc">-</div>
                </div>
            </div>
            <div class="analytics-panel">
                <h3 class="analytics-panel-title">Oggy vs Base Accuracy Over Time</h3>
                <div class="chart-container chart-lg">
                    <canvas id="diet-accuracy-chart"></canvas>
                </div>
            </div>
        </div>
    </div>
    </main>

    <script src="/js/app.js?v=3"></script>
    <script src="/js/inquiries.js?v=3"></script>
    <script src="/js/diet-analytics.js?v=3"></script>
</body>
</html>
