<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - Harmony Map</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #harmony-map { height: 500px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
        .harmony-controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .harmony-controls select, .harmony-controls button {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 13px; background: var(--bg); cursor: pointer;
        }
        .harmony-controls button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .node-panel { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: none; }
        .node-panel.visible { display: block; }
        .score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 12px 0; }
        .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; text-align: center; }
        .score-card .score-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .score-card .score-value { font-size: 22px; font-weight: 700; margin: 4px 0; }
        .score-card .score-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; }
        .score-card .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
        .indicator-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
        .indicator-table th, .indicator-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
        .indicator-table th { font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
        .dim-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .dim-balance { background: #dbeafe; color: #1e40af; }
        .dim-flow { background: #dcfce7; color: #166534; }
        .dim-compassion { background: #fce7f3; color: #9d174d; }
        .dim-discernment { background: #fef3c7; color: #92400e; }
        .dim-awareness { background: #e0e7ff; color: #3730a3; }
        .dim-expression { background: #f3e8ff; color: #6b21a8; }
        .alert-card { padding: 8px 12px; border-radius: var(--radius); margin: 4px 0; font-size: 13px; }
        .alert-warning { background: #fef3c7; border-left: 3px solid #f59e0b; }
        .alert-critical { background: #fee2e2; border-left: 3px solid #ef4444; }
        .why-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px; }
        .why-btn:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div class="container">
        <h1 class="page-title">Harmony Map</h1>

        <!-- Controls -->
        <div class="harmony-controls">
            <select id="scope-select">
                <option value="city">Cities</option>
                <option value="state">States</option>
                <option value="country">Countries</option>
            </select>
            <button id="btn-compute-all" onclick="computeAllNodes()">Compute All Scores</button>
            <span id="compute-status" style="font-size:12px;color:var(--text-muted)"></span>
        </div>

        <!-- Map -->
        <div id="harmony-map"></div>

        <!-- Node Detail Panel -->
        <div class="node-panel" id="node-panel">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h2 id="node-name" style="margin:0">—</h2>
                <div>
                    <button class="why-btn" onclick="showExplainability()">Why?</button>
                    <button class="why-btn" style="margin-left:6px" onclick="closeNodePanel()">Close</button>
                </div>
            </div>
            <p id="node-meta" style="font-size:12px;color:var(--text-muted);margin:4px 0 0">—</p>

            <!-- Top-level scores -->
            <div class="score-grid" id="score-grid"></div>

            <!-- Alerts -->
            <div id="alerts-section" style="margin-top:12px"></div>

            <!-- Explainability (hidden by default) -->
            <div id="explain-section" style="display:none;margin-top:16px">
                <h3 style="font-size:14px;margin:0 0 8px">Indicator Breakdown</h3>
                <table class="indicator-table" id="indicator-table">
                    <thead>
                        <tr><th>Indicator</th><th>Dimension</th><th>Raw</th><th>Normalized</th><th>Weight</th></tr>
                    </thead>
                    <tbody id="indicator-tbody"></tbody>
                </table>
            </div>
        </div>

    </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/harmony-map.js"></script>
</body>
</html>
