<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - Harmony Map</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #harmony-map { height: 500px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
        .harmony-controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .harmony-controls select, .harmony-controls button {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 13px; background: var(--bg); cursor: pointer;
        }
        .harmony-controls button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .node-panel { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: none; }
        .node-panel.visible { display: block; }
        .score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 12px 0; }
        .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; text-align: center; }
        .score-card .score-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .score-card .score-value { font-size: 22px; font-weight: 700; margin: 4px 0; }
        .score-card .score-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; }
        .score-card .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
        .indicator-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
        .indicator-table th, .indicator-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
        .indicator-table th { font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
        .dim-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .dim-balance { background: #dbeafe; color: #1e40af; }
        .dim-flow { background: #dcfce7; color: #166534; }
        .dim-compassion { background: #fce7f3; color: #9d174d; }
        .dim-discernment { background: #fef3c7; color: #92400e; }
        .dim-awareness { background: #e0e7ff; color: #3730a3; }
        .dim-expression { background: #f3e8ff; color: #6b21a8; }
        .alert-card { padding: 8px 12px; border-radius: var(--radius); margin: 4px 0; font-size: 13px; }
        .alert-warning { background: #fef3c7; border-left: 3px solid #f59e0b; }
        .alert-critical { background: #fee2e2; border-left: 3px solid #ef4444; }
        .why-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px; }
        .why-btn:hover { background: var(--accent); color: #fff; }
        .overlay-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; background: var(--bg); cursor: pointer; }
        .overlay-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .freshness-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .freshness-A { background: #dcfce7; color: #166534; }
        .freshness-B { background: #dbeafe; color: #1e40af; }
        .freshness-C { background: #fef3c7; color: #92400e; }
        .freshness-D { background: #fee2e2; color: #991b1b; }
        .drivers-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
        .driver-list { font-size: 13px; }
        .driver-list h4 { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin: 0 0 6px; }
        .driver-item { padding: 4px 8px; border-radius: var(--radius); margin: 3px 0; cursor: pointer; display: flex; justify-content: space-between; }
        .driver-item:hover { background: var(--surface); }
        .driver-item.positive { border-left: 3px solid #22c55e; }
        .driver-item.negative { border-left: 3px solid #ef4444; }
        .indicator-table tr.highlight { background: #fef3c7; transition: background 1s; }
        .dir-icon { font-size: 14px; }
        .formulas-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; }
        .formulas-modal.visible { display: flex; }
        .formulas-content { background: var(--bg); border-radius: var(--radius); padding: 24px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .formulas-content h3 { margin: 0 0 16px; }
        .formula-row { font-family: monospace; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .formula-row .formula-label { font-weight: 600; color: var(--accent); }
        .formula-row .formula-val { color: var(--text-muted); font-size: 12px; }
        .e-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .e-toggle input { cursor: pointer; }
        .dim-filter { padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; background: var(--bg); }
        .new-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; background: #dbeafe; color: #2563eb; margin-left: 4px; vertical-align: middle; }
    </style>
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div class="container">
        <h1 class="page-title">Harmony Map</h1>

        <!-- Controls -->
        <div class="harmony-controls">
            <select id="scope-select">
                <option value="city">Cities</option>
                <option value="state">States</option>
                <option value="country">Countries</option>
            </select>
            <button id="btn-compute-all" onclick="computeAllNodes()">Compute All Scores</button>
            <span id="compute-status" style="font-size:12px;color:var(--text-muted)"></span>
            <span style="border-left:1px solid var(--border);height:20px;margin:0 4px"></span>
            <button class="overlay-btn active" data-overlay="harmony" onclick="toggleOverlay('harmony')">Harmony</button>
            <button class="overlay-btn" data-overlay="crime" onclick="toggleOverlay('crime')">Crime</button>
            <button class="overlay-btn" data-overlay="wellness" onclick="toggleOverlay('wellness')">Wellness</button>
        </div>

        <!-- Map -->
        <div id="harmony-map"></div>

        <!-- Observer -->
        <div class="card" style="margin-bottom:16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <h3 style="margin:0;font-size:14px">Observer <span class="observer-status-dot" id="observer-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#94a3b8"></span></h3>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
                <button class="btn btn-sm" style="padding:6px 14px;font-size:12px;background:#6366f1;color:#fff;border:1px solid #6366f1;border-radius:var(--radius);cursor:pointer" onclick="shareHarmonyMap()">Share Harmony Map</button>
                <span id="share-status" style="font-size:11px;color:var(--text-muted)"></span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px">
                <input type="checkbox" id="obs-receive" onchange="updateObserverReceive()" style="cursor:pointer">
                <label for="obs-receive">Enable Observer Pack Suggestions</label>
            </div>
            <div id="observer-packs-section" style="display:none;margin-top:8px">
                <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">Available Packs</div>
                <div id="observer-packs"><div style="font-size:12px;color:var(--text-muted)">No packs available</div></div>
            </div>
        </div>

        <!-- Node Detail Panel -->
        <div class="node-panel" id="node-panel">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h2 id="node-name" style="margin:0">—</h2>
                <div style="display:flex;gap:6px;align-items:center">
                    <span id="freshness-badge"></span>
                    <button class="why-btn" onclick="showExplainability()">Why?</button>
                    <button class="why-btn" onclick="showFormulas()">Formulas</button>
                    <button class="why-btn" onclick="closeNodePanel()">Close</button>
                </div>
            </div>
            <p id="node-meta" style="font-size:12px;color:var(--text-muted);margin:4px 0 0">—</p>

            <!-- Top-level scores -->
            <div class="score-grid" id="score-grid"></div>

            <!-- E toggle -->
            <div class="e-toggle" style="margin-top:4px">
                <input type="checkbox" id="e-toggle" onchange="toggleERaw(this.checked)">
                <label for="e-toggle">Show raw E &amp; H (product instead of cube root)</label>
            </div>

            <!-- Alerts -->
            <div id="alerts-section" style="margin-top:12px"></div>

            <!-- Drivers & Drags -->
            <div id="drivers-section" class="drivers-section" style="display:none"></div>

            <!-- Explainability (hidden by default) -->
            <div id="explain-section" style="display:none;margin-top:16px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <h3 style="font-size:14px;margin:0">Indicator Breakdown</h3>
                    <select class="dim-filter" id="dim-filter" onchange="filterIndicatorTable(this.value)">
                        <option value="all">All Dimensions</option>
                        <option value="balance">Balance</option>
                        <option value="flow">Flow</option>
                        <option value="compassion">Compassion</option>
                        <option value="discernment">Discernment</option>
                        <option value="awareness">Awareness</option>
                        <option value="expression">Expression</option>
                    </select>
                </div>
                <table class="indicator-table" id="indicator-table">
                    <thead>
                        <tr><th>Indicator</th><th>Dimension</th><th>Dir</th><th>Raw</th><th>Normalized</th><th>Weight</th></tr>
                    </thead>
                    <tbody id="indicator-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- Formulas Modal -->
        <div class="formulas-modal" id="formulas-modal" onclick="if(event.target===this)this.classList.remove('visible')">
            <div class="formulas-content">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                    <h3 style="margin:0">Equilibrium Canon Formulas</h3>
                    <button class="why-btn" onclick="document.getElementById('formulas-modal').classList.remove('visible')">Close</button>
                </div>
                <div id="formulas-body"></div>
            </div>
        </div>

    </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/harmony-map.js"></script>
</body>
</html>
