<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - Harmony Data Catalog</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <style>
        .dataset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; margin-top: 16px; }
        .dataset-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
        .dataset-card h3 { margin: 0 0 6px; font-size: 14px; }
        .dataset-card .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .dataset-card .fields-list { list-style: none; padding: 0; margin: 0; }
        .dataset-card .fields-list li { font-size: 12px; padding: 2px 0; border-bottom: 1px solid var(--border); }
        .dataset-card .fields-list li:last-child { border-bottom: none; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-license { background: #dbeafe; color: #1e40af; }
        .badge-cadence { background: #dcfce7; color: #166534; }
        .dataset-link { color: #6366f1; font-size: 12px; text-decoration: none; }
        .dataset-link:hover { text-decoration: underline; }
        .suggestion-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin: 6px 0; }
        .suggestion-card .sg-title { font-weight: 600; font-size: 13px; }
        .suggestion-card .sg-desc { font-size: 12px; color: var(--text-muted); margin: 4px 0; }
        .suggestion-card .sg-meta { font-size: 11px; color: var(--text-muted); }
        .sg-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; background: #dcfce7; color: #166534; }
        .sg-actions { display: flex; gap: 8px; margin-top: 8px; }
        .sg-actions button { padding: 5px 14px; font-size: 12px; font-weight: 600; border-radius: var(--radius); cursor: pointer; border: none; }
        .sg-accept { background: #22c55e; color: #fff; }
        .sg-reject { background: transparent; color: var(--text-muted); border: 1px solid var(--border) !important; }
    </style>
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <h1 class="page-title" style="margin:0">Data Catalog</h1>
            <button id="btn-check-updates" onclick="checkForUpdates()" style="padding:8px 18px;font-size:13px;font-weight:600;border-radius:var(--radius);cursor:pointer;border:none;background:#6366f1;color:#fff">Check for Updates</button>
        </div>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:4px">
            Datasets powering the Harmony Map indicators. All data sourced from public domain or CC-licensed sources.
        </p>

        <div id="suggestions-panel" style="display:none;margin:12px 0">
            <h3 style="font-size:14px;margin:0 0 8px">Suggested New Data Sources</h3>
            <div id="suggestions-list"></div>
        </div>

        <div class="dataset-grid" id="dataset-grid">Loading...</div>
    </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/harmony-data.js"></script>
</body>
</html>
