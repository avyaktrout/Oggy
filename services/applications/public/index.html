<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - Enter Payment</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div id="inquiry-banner-container"></div>

    <div class="container">
        <h1 class="page-title">Enter Payment</h1>

        <div class="card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
                <input type="file" id="receipt-file" accept="image/*,.pdf" style="display:none">
                <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('receipt-file').click()" style="white-space:nowrap">Scan Receipt</button>
                <span id="receipt-status" style="font-size:12px;color:var(--text-muted)"></span>
            </div>

            <form id="expense-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Amount *</label>
                        <input type="number" id="amount" step="0.01" min="0" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Transaction Date *</label>
                        <input type="date" id="transaction_date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description *</label>
                    <input type="text" id="description" required placeholder="e.g. Lunch at Italian restaurant">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Merchant</label>
                        <input type="text" id="merchant" placeholder="e.g. Olive Garden">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="">Let Oggy decide</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tags (comma-separated)</label>
                    <input type="text" id="tags" placeholder="e.g. business, lunch">
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes" rows="2" placeholder="Optional notes..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" id="submit-btn">Add Payment</button>

                <div style="margin-top:10px">
                    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);cursor:pointer">
                        <input type="checkbox" id="diet-transfer-enabled">
                        Transfer food/drink info to Diet Agent?
                    </label>
                </div>
            </form>

            <div class="suggestion-box" id="diet-suggestion-box" style="margin-top:12px">
                <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px">Oggy detected food/drink. Add to your diet log?</div>
                <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
                    <select id="diet-sug-meal" style="padding:4px 8px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px">
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="snack">Snack</option>
                    </select>
                    <select id="diet-sug-type" style="padding:4px 8px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px">
                        <option value="food">Food</option>
                        <option value="liquid">Liquid</option>
                    </select>
                </div>
                <div id="diet-sug-clarification" style="display:none;background:#fef3c7;border:1px solid #f59e0b;border-radius:var(--radius);padding:10px;margin-bottom:8px">
                    <div style="font-size:13px;font-weight:600;color:#92400e;margin-bottom:6px">&#9888; Oggy needs to know: how many/much did you have?</div>
                    <div id="diet-sug-clarification-context" style="font-size:12px;color:#78350f;margin-bottom:8px"></div>
                    <div style="display:flex;gap:8px;align-items:center">
                        <input type="number" id="diet-sug-quantity" placeholder="Qty" min="0.1" step="0.1" style="width:70px;padding:4px 8px;border-radius:var(--radius);border:1px solid #f59e0b;font-size:13px;background:white">
                        <select id="diet-sug-unit" style="padding:4px 8px;border-radius:var(--radius);border:1px solid #f59e0b;font-size:13px;background:white">
                            <option value="">unit</option>
                            <option value="piece">piece(s)</option>
                            <option value="cup">cup(s)</option>
                            <option value="oz">oz</option>
                            <option value="g">g</option>
                            <option value="ml">ml</option>
                            <option value="serving">serving(s)</option>
                            <option value="slice">slice(s)</option>
                            <option value="bottle">bottle(s)</option>
                            <option value="can">can(s)</option>
                        </select>
                    </div>
                </div>
                <input type="text" id="diet-sug-description" placeholder="Food description" style="width:100%;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;margin-bottom:8px">
                <div id="diet-sug-items" style="font-size:12px;color:var(--text-muted);margin-bottom:8px"></div>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-success btn-sm" id="diet-sug-accept">Add to Diet</button>
                    <button class="btn btn-outline btn-sm" id="diet-sug-dismiss">Skip</button>
                </div>
            </div>

            <div class="suggestion-box" id="suggestion-box">
                <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">Oggy suggests:</div>
                <div class="suggestion-category" id="sug-category"></div>
                <div class="suggestion-confidence" id="sug-confidence"></div>
                <div class="suggestion-reasoning" id="sug-reasoning"></div>
                <div class="suggestion-actions">
                    <button class="btn btn-success btn-sm" id="sug-accept">Accept</button>
                    <button class="btn btn-outline btn-sm" id="sug-reject">Choose Different</button>
                </div>
            </div>
        </div>
    </div>
    </main>

    <script src="/js/app.js?v=2"></script>
    <script src="/js/inquiries.js?v=2"></script>
    <script src="/js/enter-payment.js?v=2"></script>
</body>
</html>
