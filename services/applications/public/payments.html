<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - View Payments</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div id="inquiry-banner-container"></div>

    <div class="container">
        <h1 class="page-title">View Payments</h1>

        <div class="card">
            <div class="filter-bar">
                <div class="form-group">
                    <label>From</label>
                    <input type="date" id="filter-from">
                </div>
                <div class="form-group">
                    <label>To</label>
                    <input type="date" id="filter-to">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="filter-category">
                        <option value="">All</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Merchant</label>
                    <input type="text" id="filter-merchant" placeholder="Search...">
                </div>
                <button class="btn btn-primary btn-sm" onclick="loadExpenses()">Search</button>
                <button class="btn btn-outline btn-sm" onclick="clearFilters()">Clear</button>
            </div>
        </div>

        <div class="card">
            <div class="summary-bar" id="summary-bar">
                <span>Total: <strong id="sum-count">0</strong> payments</span>
                <span>Amount: <strong id="sum-amount">$0.00</strong></span>
                <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer;margin-left:auto">
                    <input type="checkbox" id="diet-transfer-toggle"> Send to Diet
                </label>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Merchant</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th style="text-align:right">Amount</th>
                            <th style="width:60px"></th>
                        </tr>
                    </thead>
                    <tbody id="expenses-body">
                        <tr><td colspan="6" class="loading"><span class="spinner"></span>Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="text-align:center;padding:16px">
                <button class="btn btn-outline btn-sm" id="load-more-btn" style="display:none" onclick="loadMore()">Load More</button>
            </div>
        </div>
    </div>
    </main>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Edit Payment</span>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="edit-date">
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="edit-amount" step="0.01" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Merchant</label>
                        <input type="text" id="edit-merchant">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="edit-category">
                            <option value="">Uncategorized</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="edit-description">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="edit-notes" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary btn-sm" id="edit-save-btn" onclick="saveExpense()">Save</button>
            </div>
        </div>
    </div>

    <!-- Diet Transfer Modal -->
    <div class="modal-overlay" id="diet-modal" style="display:none">
        <div class="modal" style="max-width:400px">
            <div class="modal-header">
                <span class="modal-title">Send to Diet</span>
                <button class="modal-close" onclick="closeDietModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Food Description</label>
                    <input type="text" id="diet-modal-desc" placeholder="What did you eat/drink?">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Meal Type</label>
                        <select id="diet-modal-meal">
                            <option value="breakfast">Breakfast</option>
                            <option value="lunch">Lunch</option>
                            <option value="dinner">Dinner</option>
                            <option value="snack">Snack</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Entry Type</label>
                        <select id="diet-modal-type">
                            <option value="food">Food</option>
                            <option value="liquid">Liquid</option>
                        </select>
                    </div>
                </div>
                <div id="diet-modal-clarification" style="display:none;background:#fef3c7;border:1px solid #f59e0b;border-radius:var(--radius);padding:10px;margin-bottom:12px">
                    <div style="font-size:13px;font-weight:600;color:#92400e;margin-bottom:4px">&#9888; How many/much did you have?</div>
                    <div id="diet-modal-clarification-ctx" style="font-size:12px;color:#78350f"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="diet-modal-qty" placeholder="e.g. 2" min="0.1" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Unit</label>
                        <select id="diet-modal-unit">
                            <option value="">—</option>
                            <option value="piece">piece(s)</option>
                            <option value="cup">cup(s)</option>
                            <option value="oz">oz</option>
                            <option value="g">g</option>
                            <option value="ml">ml</option>
                            <option value="serving">serving(s)</option>
                            <option value="slice">slice(s)</option>
                            <option value="bottle">bottle(s)</option>
                            <option value="can">can(s)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="diet-modal-date">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm" onclick="closeDietModal()">Cancel</button>
                <button class="btn btn-success btn-sm" id="diet-modal-send" onclick="sendToDiet()">Send to Diet</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js?v=2"></script>
    <script src="/js/inquiries.js?v=2"></script>
    <script src="/js/view-payments.js?v=2"></script>
</body>
</html>
