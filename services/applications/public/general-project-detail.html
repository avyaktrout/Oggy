<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - Project</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div class="container">
        <!-- Project Header -->
        <div class="card" id="project-header" style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                    <h1 class="page-title" style="margin-bottom:4px" id="project-name">Loading...</h1>
                    <div style="color:var(--text-muted);font-size:13px" id="project-desc"></div>
                </div>
                <a href="/general-projects.html" class="btn btn-outline btn-sm">Back to Projects</a>
            </div>
        </div>

        <!-- Project Chat -->
        <div class="chat-title-row">
            <div style="font-weight:600;font-size:15px">Project Chat</div>
            <div class="chat-controls">
                <label class="toggle-label">
                    <input type="checkbox" id="learn-toggle" onchange="shellToggleLearning(this.checked)">
                    <span class="toggle-switch"></span>
                    <span class="toggle-text">Learn from chat</span>
                </label>
                <button class="btn btn-sm btn-outline" onclick="shellClearChat()">Clear Chat</button>
            </div>
        </div>

        <div class="chat-container" style="grid-template-columns:1fr">
            <div class="chat-column">
                <div class="chat-header">
                    <span class="dot dot-oggy"></span>
                    Oggy
                    <span class="learning-indicator" id="learning-indicator" style="display:none">learning</span>
                </div>
                <div class="chat-messages" id="oggy-messages">
                    <div class="chat-msg chat-msg-bot">Hi! Ask me anything about this project.</div>
                </div>
            </div>
        </div>

        <div class="chat-input-row" style="margin-top:12px">
            <input type="text" id="chat-input" placeholder="Ask about this project..."
                   onkeydown="if(event.key===&#39;Enter&#39;)shellSendChat()">
            <button class="btn btn-primary" onclick="shellSendChat()" id="chat-send-btn">Send</button>
        </div>
    </div>
    </main>

    <script src="/js/app.js?v=2"></script>
    <script src="/js/agent-shell.js?v=3"></script>
    <script src="/js/general-project-detail.js?v=2"></script>
</body>
</html>
