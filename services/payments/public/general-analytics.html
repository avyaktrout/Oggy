<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - General Analytics</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body class="app-layout">
    <header class="topbar" id="topbar"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
    <div class="container" style="max-width:1200px">
        <div class="analytics-header">
            <div>
                <h1 class="page-title" style="margin-bottom:4px">General Assistant Analytics</h1>
                <p class="analytics-subtitle">Conversation and learning insights</p>
            </div>
        </div>

        <div class="analytics-cards" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
            <div class="analytics-card">
                <div class="analytics-card-label">Total Conversations</div>
                <div class="analytics-card-value" id="stat-conversations">-</div>
            </div>
            <div class="analytics-card">
                <div class="analytics-card-label">Projects</div>
                <div class="analytics-card-value" id="stat-projects">-</div>
            </div>
            <div class="analytics-card">
                <div class="analytics-card-label">Learning Events</div>
                <div class="analytics-card-value" id="stat-learning">-</div>
            </div>
        </div>

        <div class="analytics-row">
            <div class="analytics-panel" style="flex:2">
                <div class="analytics-panel-title">Daily Chat Activity (Last 14 Days)</div>
                <div class="chart-container chart-lg">
                    <canvas id="activity-chart"></canvas>
                </div>
            </div>
            <div class="analytics-panel" style="flex:1;max-width:320px">
                <div class="analytics-panel-title">Training Status</div>
                <div id="training-summary" style="padding:20px;text-align:center;color:var(--text-muted);font-size:14px">
                    No training data yet. Start training from the Chat page.
                </div>
            </div>
        </div>
    </div>
    </main>

    <script src="/js/app.js?v=2"></script>
    <script src="/js/general-analytics.js?v=2"></script>
</body>
</html>
