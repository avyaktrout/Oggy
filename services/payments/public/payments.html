<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - View Payments</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="nav" id="nav"></nav>

    <div id="inquiry-banner-container"></div>

    <div class="container">
        <h1 class="page-title">View Payments</h1>

        <div class="card">
            <div class="filter-bar">
                <div class="form-group">
                    <label>From</label>
                    <input type="date" id="filter-from">
                </div>
                <div class="form-group">
                    <label>To</label>
                    <input type="date" id="filter-to">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="filter-category">
                        <option value="">All</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Merchant</label>
                    <input type="text" id="filter-merchant" placeholder="Search...">
                </div>
                <button class="btn btn-primary btn-sm" onclick="loadExpenses()">Search</button>
                <button class="btn btn-outline btn-sm" onclick="clearFilters()">Clear</button>
            </div>
        </div>

        <div class="card">
            <div class="summary-bar" id="summary-bar">
                <span>Total: <strong id="sum-count">0</strong> payments</span>
                <span>Amount: <strong id="sum-amount">$0.00</strong></span>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Merchant</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th style="text-align:right">Amount</th>
                            <th style="width:60px"></th>
                        </tr>
                    </thead>
                    <tbody id="expenses-body">
                        <tr><td colspan="6" class="loading"><span class="spinner"></span>Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="text-align:center;padding:16px">
                <button class="btn btn-outline btn-sm" id="load-more-btn" style="display:none" onclick="loadMore()">Load More</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Edit Payment</span>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="edit-date">
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="edit-amount" step="0.01" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Merchant</label>
                        <input type="text" id="edit-merchant">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="edit-category">
                            <option value="">Uncategorized</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="edit-description">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="edit-notes" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary btn-sm" id="edit-save-btn" onclick="saveExpense()">Save</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/inquiries.js"></script>
    <script src="/js/view-payments.js"></script>
</body>
</html>
