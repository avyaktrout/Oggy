<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oggy - Sign In</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .login-brand { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .login-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
        .login-input {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 15px; margin-bottom: 16px; box-sizing: border-box;
            background: var(--bg-secondary); color: var(--text);
        }
        .login-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .login-btn {
            width: 100%; padding: 12px; border: none; border-radius: var(--radius);
            background: var(--primary); color: #fff; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .login-btn:hover { background: var(--primary-hover); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-status {
            margin-top: 16px; font-size: 13px; min-height: 20px;
        }
        .login-status.success { color: var(--success); }
        .login-status.error { color: var(--danger); }
        .login-dev-url {
            margin-top: 12px; padding: 10px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 12px; word-break: break-all; text-align: left;
        }
        .login-dev-url a { color: var(--primary); text-decoration: none; }
        .login-dev-url a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">Oggy</div>
        <div class="login-subtitle">Sign in with your email to continue</div>

        <form onsubmit="requestMagicLink(event)">
            <input type="email" class="login-input" id="login-email"
                   placeholder="you@example.com" required autofocus>
            <button type="submit" class="login-btn" id="login-btn">Send Magic Link</button>
        </form>

        <div class="login-status" id="login-status"></div>
        <div id="login-dev-link" style="display:none"></div>
    </div>

    <script>
        async function requestMagicLink(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const btn = document.getElementById('login-btn');
            const status = document.getElementById('login-status');
            const devLink = document.getElementById('login-dev-link');

            btn.disabled = true;
            btn.textContent = 'Sending...';
            status.textContent = '';
            status.className = 'login-status';
            devLink.style.display = 'none';

            try {
                const res = await fetch('/v0/auth/request-magic-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                    credentials: 'include'
                });
                const data = await res.json();

                if (res.ok) {
                    status.textContent = data.message || 'Check your email for a login link.';
                    status.className = 'login-status success';

                    // Dev mode: show clickable link
                    if (data.dev_url) {
                        devLink.innerHTML = `<div class="login-dev-url"><strong>Dev mode:</strong> <a href="${data.dev_url}">Click here to sign in</a></div>`;
                        devLink.style.display = 'block';
                    }
                } else {
                    status.textContent = data.error || 'Something went wrong.';
                    status.className = 'login-status error';
                }
            } catch (err) {
                status.textContent = 'Network error. Please try again.';
                status.className = 'login-status error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Magic Link';
            }
        }

        // If already authenticated, redirect to home
        fetch('/v0/auth/me', { credentials: 'include' })
            .then(r => { if (r.ok) window.location.href = '/'; })
            .catch(() => {});
    </script>
</body>
</html>
