services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oggy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oggy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oggy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-oggy_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/memory/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oggy} -d ${POSTGRES_DB:-oggy_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache / Working Memory
  redis:
    image: redis:7-alpine
    container_name: oggy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: oggy-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics
      - "13133:13133" # Health check
    depends_on:
      - postgres

  # Memory Service (Node.js)
  memory-service:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    container_name: oggy-memory-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${MEMORY_SERVICE_PORT:-3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-oggy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oggy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-oggy_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: memory-service
    ports:
      - "3000:3000"
    volumes:
      - ./services/memory:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    command: npm run dev

  # Payments Service (Node.js) - Week 5
  payments-service:
    build:
      context: ./services/payments
      dockerfile: Dockerfile
    container_name: oggy-payments-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PAYMENTS_SERVICE_PORT:-3001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-oggy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oggy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-oggy_db}
      MEMORY_SERVICE_URL: http://memory-service:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: payments-service
      DAILY_TOKEN_BUDGET: "20000000"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "3001:3001"
    volumes:
      - ./services/payments:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      memory-service:
        condition: service_started
    command: npm start

  # Learning Service (Python)
  learning-service:
    build:
      context: ./services/learning
      dockerfile: Dockerfile
    container_name: oggy-learning-service
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      MEMORY_SERVICE_URL: http://memory-service:3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-oggy}:${POSTGRES_PASSWORD:-oggy_dev_password}@postgres:5432/${POSTGRES_DB:-oggy_db}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: learning-service
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Learning Loop Configuration (Week 4)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      LEARNING_GATE_STATE: ${LEARNING_GATE_STATE:-GATE_OPEN_LIMITED}
      MIN_OBSERVATIONS_FOR_UPDATE: ${MIN_OBSERVATIONS_FOR_UPDATE:-3}
      STABILITY_THRESHOLD: ${STABILITY_THRESHOLD:-0.7}
      MAX_ITEMS_PER_CYCLE: ${MAX_ITEMS_PER_CYCLE:-10}
      ENABLE_SELF_DRIVEN: ${ENABLE_SELF_DRIVEN:-true}
      LEARNING_SCHEDULE_HOUR: ${LEARNING_SCHEDULE_HOUR:-2}
      LEARNING_SCHEDULE_MINUTE: ${LEARNING_SCHEDULE_MINUTE:-0}
      PRACTICE_PACKS_DIR: /app/data/practice_packs
      SEALED_BENCHMARKS_DIR: /app/data/sealed_benchmarks
    ports:
      - "8000:8000"
    volumes:
      - ./services/learning:/app
      - ./data:/app/data
    depends_on:
      - memory-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: oggy-network
